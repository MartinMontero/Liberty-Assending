<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>body{margin:0}</style>
<script type="importmap">
{ "imports": { "three": "../vendor/three/three.module.js", "three/addons/": "../vendor/three/addons/" } }
</script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(640, 480);
document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x101020);
const camera = new THREE.PerspectiveCamera(60, 640/480, 0.1, 100);
camera.position.z = 3;
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({ color: 0xff4422, emissive: 0xff2200, emissiveIntensity: 2 })
);
scene.add(cube);
scene.add(new THREE.AmbientLight(0xffffff, 1));
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(640,480), 0.8, 0.4, 0.1));
composer.addPass(new OutputPass());
cube.rotation.set(0.5, 0.8, 0);
composer.render();
window.__SMOKE_OK = true;
</script>
</body>
</html>
